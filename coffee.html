<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katja Norstad — Coffee</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #c4501a;
      --line: #d8d3cc;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.7;
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 1.8rem 0 0;
    }

    .back:hover { color: var(--accent); }

    header {
      padding: 3rem 0;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 300;
      line-height: 1.1;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .intro {
      margin-top: 1rem;
      color: var(--muted);
      max-width: 540px;
    }

    /* MAP */
    .map-section {
      padding: 2.5rem 0 0;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    #map {
      width: 100%;
      height: 420px;
      border-radius: 4px;
      border: 1px solid var(--line);
      display: block;
    }

    footer {
      padding: 2.5rem 0;
      text-align: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="index.html" class="back">← Back</a>

  <header>
    <p class="eyebrow">Oslo specialty coffee</p>
    <h1>My <em>coffee</em> notes</h1>
    <p class="intro">
      Tasting notes from Oslo's best specialty coffee bars.
    </p>
  </header>

  <div class="map-section">
    <p class="section-label">On the map</p>
    <div id="map"></div>
  </div>

  <footer>© 2026 Katja Norstad</footer>

</div>

<!-- ✅ FIXED MAP LOGIC -->
<script>
  window.initMap = function () {
    const mapEl = document.getElementById("map");
    if (!mapEl) return;

    const map = new google.maps.Map(mapEl, {
      zoom: 13,
      center: { lat: 59.916, lng: 10.752 },
      styles: [
        { elementType: "geometry", stylers: [{ color: "#f0ebe3" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#5a4a3a" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#e0d8cc" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#c8d8e8" }] }
      ]
    });

    const places = [
      { name: "Tim Wendelboe", lat: 59.9233709, lng: 10.7556998 },
      { name: "Fuglen Coffee", lat: 59.9062171, lng: 10.7746492 },
      { name: "Kaffebrenneriet", lat: 59.9120349, lng: 10.7403625 },
      { name: "Java", lat: 59.924436, lng: 10.739647 },
      { name: "Hakone Coffee", lat: 59.9138937, lng: 10.7507774 }
    ];

    const info = new google.maps.InfoWindow();

    places.forEach(p => {
      const marker = new google.maps.Marker({
        position: { lat: p.lat, lng: p.lng },
        map,
        title: p.name
      });

      marker.addListener("click", () => {
        info.setContent(`<strong>${p.name}</strong>`);
        info.open(map, marker);
      });
    });
  };
</script>

<!-- ✅ FIXED SCRIPT LOADING (NO async) -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap"
  defer>
</script>

</body>
</html>
