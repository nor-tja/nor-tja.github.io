<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katja Norstad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #c4501a;
      --line: #d8d3cc;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── coffee ring stain ── */
    .mug-stain {
      position: fixed;
      bottom: -40px;
      right: -30px;
      width: 260px;
      height: 260px;
      opacity: 0.18;
      pointer-events: none;
      animation: fadeStain 2s ease forwards 1.2s;
      opacity: 0;
    }
    @keyframes fadeStain {
      to { opacity: 0.18; }
    }

    .center {
      max-width: 520px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .greeting {
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      line-height: 1.55;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.15s;
    }
    .greeting em { font-style: italic; color: var(--accent); }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.4s;
    }
    .links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      transition: color 0.2s;
    }
    .links a::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--line);
      transition: width 0.25s, background 0.2s;
      flex-shrink: 0;
    }
    .links a:hover { color: var(--accent); }
    .links a:hover::before { width: 40px; background: var(--accent); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Coffee mug ring stain -->
  <svg class="mug-stain" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Organic distortion filter -->
      <filter id="organic">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="8" />
        <feDisplacementMap in="SourceGraphic" scale="12" />
        <feGaussianBlur stdDeviation="0.6" />
      </filter>

      <!-- Coffee texture -->
      <filter id="texture">
        <feTurbulence type="fractalNoise" baseFrequency="2" numOctaves="4" seed="3" />
        <feColorMatrix type="saturate" values="0.2" />
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.12" />
        </feComponentTransfer>
        <feBlend in="SourceGraphic" mode="multiply" />
      </filter>

      <!-- Main ring gradient - dark outer edge -->
      <radialGradient id="ring">
        <stop offset="0%" stop-color="#8b7355" stop-opacity="0.02" />
        <stop offset="60%" stop-color="#7a6448" stop-opacity="0.04" />
        <stop offset="80%" stop-color="#5c4a36" stop-opacity="0.08" />
        <stop offset="88%" stop-color="#3d2f1f" stop-opacity="0.45" />
        <stop offset="91%" stop-color="#4a3825" stop-opacity="0.65" />
        <stop offset="94%" stop-color="#3d2f1f" stop-opacity="0.52" />
        <stop offset="97%" stop-color="#5c4a36" stop-opacity="0.28" />
        <stop offset="100%" stop-color="#6b5442" stop-opacity="0.08" />
      </radialGradient>
    </defs>

    <!-- Main stain circle with organic edges -->
    <circle cx="130" cy="130" r="80" fill="url(#ring)" filter="url(#organic) url(#texture)" />

    <!-- Subtle pooling variations inside -->
    <ellipse cx="142" cy="118" rx="16" ry="20" fill="#5c4a36" opacity="0.08"
             filter="url(#texture)" transform="rotate(22 142 118)" />
    <ellipse cx="115" cy="142" rx="20" ry="14" fill="#4a3825" opacity="0.1"
             filter="url(#texture)" transform="rotate(-18 115 142)" />
    <circle cx="132" cy="135" r="10" fill="#6b5442" opacity="0.06" filter="url(#texture)" />

    <!-- Small scattered drips -->
    <ellipse cx="72" cy="98" rx="2.8" ry="4.5" fill="#5c4a36" opacity="0.28"
             filter="url(#organic)" transform="rotate(48 72 98)" />
    <circle cx="192" cy="165" r="2.2" fill="#4a3825" opacity="0.32" filter="url(#organic)" />
    <ellipse cx="98" cy="188" rx="2.4" ry="3.8" fill="#5c4a36" opacity="0.25"
             filter="url(#organic)" transform="rotate(-35 98 188)" />
    <circle cx="158" cy="68" r="1.8" fill="#6b5442" opacity="0.22" filter="url(#organic)" />
  </svg>

  <div class="center">
    <p class="greeting">
      Hello, I am <em>Katja</em>. I am a data scientist who enjoys building
      and organising things. Here are links to my CV, my (ancient) blog,
      resources I appreciate, and my favourite coffee spots.
    </p>
    <nav class="links">
      <a href="cv.html">CV</a>
      <a href="https://katjanorstad.medium.com/" target="_blank" rel="noopener">Blog</a>
      <a href="resources.html">Resources</a>
      <a href="coffee.html">Coffee</a>
    </nav>
  </div>
</body>
</html>
