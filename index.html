  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #c4501a;
      --line: #d8d3cc;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Coffee ring stain — bottom right, transparent SVG ── */
    .stain {
      position: fixed;
      bottom: -80px;
      right: -60px;
      width: 380px;
      height: auto;
      pointer-events: none;
      opacity: 0;
      animation: fadeStain 2.5s ease forwards 1.4s;
      mix-blend-mode: multiply;
    }
    @keyframes fadeStain { to { opacity: 0.55; } }

    .center {
      max-width: 520px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .greeting {
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      line-height: 1.55;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.15s;
    }
    .greeting em { font-style: italic; color: var(--accent); }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.4s;
    }
    .links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: color 0.2s;
    }
    .links a .icon {
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .links a::after {
      content: '';
      display: block;
      height: 1px;
      flex: 1;
      background: var(--line);
      transition: background 0.2s;
      max-width: 28px;
    }
    .links a:hover { color: var(--accent); }
    .links a:hover .icon { opacity: 1; }
    .links a:hover::after { background: var(--accent); max-width: 44px; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
