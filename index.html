<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katja Norstad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #c4501a;
      --line: #d8d3cc;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .center {
      max-width: 520px;
      padding: 2rem;
    }
    .greeting {
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      line-height: 1.55;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.15s;
    }
    .greeting em { font-style: italic; color: var(--accent); }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.4s;
    }
    .links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      transition: color 0.2s;
    }
    .links a::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--line);
      transition: width 0.25s, background 0.2s;
      flex-shrink: 0;
    }
    .links a:hover { color: var(--accent); }
    .links a:hover::before { width: 40px; background: var(--accent); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="center">
    <p class="greeting">
      Hello, I am <em>Katja</em>. I am a data scientist who enjoys building
      and organising things. Here are links to my CV, my (ancient) blog,
      and resources I appreciate.
    </p>
    <nav class="links">
      <a href="cv.html">CV</a>
      <a href="https://katjanorstad.medium.com/" target="_blank" rel="noopener">Blog</a>
      <a href="resources.html">Resources</a>
    </nav>
  </div>
</body>
</html>
