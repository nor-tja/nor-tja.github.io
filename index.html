<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katja Norstad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #c4501a;
      --line: #d8d3cc;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── coffee ring stain ── */
    .mug-stain {
      position: fixed;
      bottom: -40px;
      right: -30px;
      width: 260px;
      height: 260px;
      opacity: 0.18;
      pointer-events: none;
      animation: fadeStain 2s ease forwards 1.2s;
      opacity: 0;
    }
    @keyframes fadeStain {
      to { opacity: 0.18; }
    }

    .center {
      max-width: 520px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .greeting {
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      line-height: 1.55;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.15s;
    }
    .greeting em { font-style: italic; color: var(--accent); }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      opacity: 0;
      animation: rise 0.9s ease forwards 0.4s;
    }
    .links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      transition: color 0.2s;
    }
    .links a::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--line);
      transition: width 0.25s, background 0.2s;
      flex-shrink: 0;
    }
    .links a:hover { color: var(--accent); }
    .links a:hover::before { width: 40px; background: var(--accent); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Coffee mug ring stain -->
  <svg class="mug-stain" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Filters for realistic texture -->
      <filter id="coffeeBlur">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" />
      </filter>
      <filter id="stainTexture">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2" />
        <feColorMatrix type="saturate" values="0.3" />
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.4" />
        </feComponentTransfer>
        <feBlend in="SourceGraphic" in2="stainTexture" mode="multiply" />
      </filter>

      <!-- Gradients for organic color variation -->
      <radialGradient id="ringGrad1">
        <stop offset="0%" style="stop-color:#8b6f47;stop-opacity:0" />
        <stop offset="70%" style="stop-color:#8b6f47;stop-opacity:0.6" />
        <stop offset="85%" style="stop-color:#6d5638;stop-opacity:0.85" />
        <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:0.4" />
      </radialGradient>
      <radialGradient id="ringGrad2">
        <stop offset="0%" style="stop-color:#9d7d54;stop-opacity:0" />
        <stop offset="75%" style="stop-color:#9d7d54;stop-opacity:0.45" />
        <stop offset="90%" style="stop-color:#7a5f3d;stop-opacity:0.7" />
        <stop offset="100%" style="stop-color:#9d7d54;stop-opacity:0.3" />
      </radialGradient>
      <radialGradient id="innerStain">
        <stop offset="0%" style="stop-color:#7a5f3d;stop-opacity:0.2" />
        <stop offset="50%" style="stop-color:#8b6f47;stop-opacity:0.35" />
        <stop offset="100%" style="stop-color:#6d5638;stop-opacity:0.15" />
      </radialGradient>
    </defs>

    <!-- Main coffee ring - outer -->
    <ellipse cx="135" cy="128" rx="82" ry="78" fill="none" stroke="url(#ringGrad1)"
             stroke-width="3.2" opacity="0.9" filter="url(#coffeeBlur)"
             transform="rotate(-8 135 128)" />

    <!-- Secondary ring - slightly irregular -->
    <ellipse cx="133" cy="127" rx="76" ry="73" fill="none" stroke="url(#ringGrad2)"
             stroke-width="2.8" opacity="0.75" filter="url(#coffeeBlur)"
             transform="rotate(-12 133 127)" />

    <!-- Inner filled stain area -->
    <ellipse cx="134" cy="127.5" rx="68" ry="65" fill="url(#innerStain)"
             filter="url(#stainTexture)" transform="rotate(-10 134 127.5)" />

    <!-- Tertiary faint ring -->
    <ellipse cx="134.5" cy="128.5" rx="88" ry="84" fill="none" stroke="#9d7d54"
             stroke-width="1.8" opacity="0.4" filter="url(#coffeeBlur)"
             transform="rotate(-6 134.5 128.5)" />

    <!-- Organic splatters and drips -->
    <circle cx="95" cy="162" r="4.5" fill="#8b6f47" opacity="0.5" filter="url(#coffeeBlur)" />
    <ellipse cx="178" cy="94" rx="3.2" ry="5.8" fill="#7a5f3d" opacity="0.45"
             filter="url(#coffeeBlur)" transform="rotate(25 178 94)" />
    <circle cx="115" cy="68" r="2.8" fill="#9d7d54" opacity="0.4" filter="url(#coffeeBlur)" />
    <ellipse cx="188" cy="145" rx="2.5" ry="4.2" fill="#8b6f47" opacity="0.5"
             filter="url(#coffeeBlur)" transform="rotate(-15 188 145)" />
    <circle cx="82" cy="118" r="3.5" fill="#7a5f3d" opacity="0.42" filter="url(#coffeeBlur)" />
    <ellipse cx="156" cy="182" rx="4" ry="2.8" fill="#9d7d54" opacity="0.38"
             filter="url(#coffeeBlur)" transform="rotate(42 156 182)" />

    <!-- Small detail splatters -->
    <circle cx="142" cy="74" r="1.8" fill="#8b6f47" opacity="0.35" filter="url(#coffeeBlur)" />
    <circle cx="200" cy="122" r="2.2" fill="#7a5f3d" opacity="0.4" filter="url(#coffeeBlur)" />
    <circle cx="108" cy="188" r="2.5" fill="#9d7d54" opacity="0.32" filter="url(#coffeeBlur)" />
  </svg>

  <div class="center">
    <p class="greeting">
      Hello, I am <em>Katja</em>. I am a data scientist who enjoys building
      and organising things. Here are links to my CV, my (ancient) blog,
      resources I appreciate, and my favourite coffee spots.
    </p>
    <nav class="links">
      <a href="cv.html">CV</a>
      <a href="https://katjanorstad.medium.com/" target="_blank" rel="noopener">Blog</a>
      <a href="resources.html">Resources</a>
      <a href="coffee.html">Coffee</a>
    </nav>
  </div>
</body>
</html>
